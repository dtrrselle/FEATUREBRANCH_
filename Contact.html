<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Minimal Monochrome</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    
    <style>
        :root {
            --bg-color: #ffffff; 
            --card-bg: #ffffff;  
            --text-main: #000000;
            --text-muted: #555555;
            --border-color: #111111;
            --grid-line: #dddddd;
            --transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            letter-spacing: -0.01em;
        }

        .contact-card {
            background: var(--card-bg);
            width: 100%;
            max-width: 440px;
            border-radius: 0px;
            border: 1px solid var(--border-color);
            outline: 6px solid rgba(0, 0, 0, 0.02);
            position: relative;
            animation: fadeIn 0.8s ease-in-out;
        }

        .contact-card::before, .contact-card::after {
            content: '';
            position: absolute;
            width: 12px;
            height: 12px;
            border: 1px solid var(--border-color);
            pointer-events: none;
        }

        .contact-card::before {
            top: -6px;
            left: -6px;
            border-right: none;
            border-bottom: none;
        }

        .contact-card::after {
            bottom: -6px;
            right: -6px;
            border-left: none;
            border-top: none;
        }

        .header {
            text-align: center;
            padding: 45px 40px 35px 40px;
            border-bottom: 1px solid var(--border-color);
        }

        h1 {
            font-weight: 800;
            text-transform: uppercase;
            font-size: 24px;
            letter-spacing: 0.08em;
            margin-bottom: 10px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 14px;
            line-height: 1.5;
        }

        .info-list {
            display: flex;
            flex-direction: column;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 26px 40px;
            border-bottom: 1px solid var(--grid-line);
            background: var(--card-bg);
            transition: var(--transition);
        }

        .info-item:hover {
            background-color: var(--border-color);
        }

        .icon-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 42px;
            height: 42px;
            background: transparent;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            border-radius: 0px;
            font-size: 16px;
            flex-shrink: 0;
            transition: var(--transition);
        }

        .info-item:hover .icon-wrapper {
            background: #ffffff;
            color: #000000;
            border-color: #ffffff;
        }

        .content {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: var(--transition);
        }

        .info-item:hover .label {
            color: #aaaaaa;
        }

        .value {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-main);
            text-decoration: none;
            line-height: 1.4;
            transition: var(--transition);
        }

        a.value {
            border-bottom: 1px dashed transparent;
        }

        a.value:hover {
            border-bottom-color: currentColor;
        }

        .info-item:hover .value {
            color: #ffffff;
        }

        footer {
            padding: 24px 40px;
            text-align: center;
            color: var(--text-muted);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background: var(--card-bg);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <main class="contact-card">
        <header class="header">
            <h1>Contact Us</h1>
            <p class="subtitle">Have questions? We are here to help you.</p>
        </header>

        <div class="info-list">
            <div class="info-item">
                <div class="icon-wrapper">
                    <i class="fa-regular fa-envelope"></i>
                </div>
                <div class="content">
                    <span class="label">Email</span>
                    <a href="mailto:sample@email.com" class="value">sample@email.com</a>
                </div>
            </div>

            <div class="info-item">
                <div class="icon-wrapper">
                    <i class="fa-solid fa-phone"></i>
                </div>
                <div class="content">
                    <span class="label">Phone</span>
                    <a href="tel:+639123456789" class="value">+63 912 345 6789</a>
                </div>
            </div>

            <div class="info-item">
                <div class="icon-wrapper">
                    <i class="fa-solid fa-location-dot"></i>
                </div>
                <div class="content">
                    <span class="label">Address</span>
                    <span class="value">Sample Street, Sample City, Philippines</span>
                </div>
            </div>
        </div>

        <footer>
            &copy; 2026 Contact Us. All rights reserved.
        </footer>
    </main>

</body>
</html>
