<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #000000, #333333);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        .contact-box {
            background: #ffffff;
            width: 380px;
            padding: 35px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
        }

        h1 {
            color: #000000;
            margin-bottom: 10px;
            font-size: 32px;
        }

        .subtitle {
            color: #555555;
            margin-bottom: 25px;
        }

        .info {
            background: #eeeeee;
            padding: 15px;
            margin: 15px 0;
            border-radius: 12px;
            transition: 0.3s;
            color: #000000;
        }

        .info:hover {
            background: #000000;
            color: #ffffff;
            transform: translateY(-5px);
        }

        .info strong {
            display: block;
            margin-bottom: 5px;
        }

        a {
            color: #000000;
            text-decoration: none;
        }

        .info:hover a {
            color: #ffffff;
        }

        .icon {
            font-size: 25px;
        }

        footer {
            margin-top: 25px;
            color: #777777;
            font-size: 14px;
        }
    </style>

</head>

<body>

    <div class="contact-box">

        <h1>Contact Us</h1>

        <p class="subtitle">
            We would love to hear from you!
        </p>

        <div class="info">
            <div class="icon">📧</div>
            <strong>Email</strong>
            <a href="mailto:sample@email.com">
                sample@email.com
            </a>
        </div>

        <div class="info">
            <div class="icon">📱</div>
            <strong>Phone</strong>
            +63 912 345 6789
        </div>

        <div class="info">
            <div class="icon">📍</div>
            <strong>Address</strong>
            Sample Street, Sample City, Philippines
        </div>

        <footer>
            © 2026 Contact Us. All rights reserved.
        </footer>

    </div>

</body>
</html>
