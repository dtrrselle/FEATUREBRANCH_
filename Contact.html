<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cloudflare.com">

    <style>
        :root {
            --bg-color: #ffffff; 
            --card-bg: #f8fafc;  
            --text-main: #0f172a;
            --text-muted: #475569;
            --grid-line: #cbd5e1;
            --grid-line-subtle: #e2e8f0;
            --accent-color: #2563eb;
            --accent-hover: #1d4ed8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            background-image: 
                linear-gradient(to right, rgba(15, 23, 42, 0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(15, 23, 42, 0.03) 1px, transparent 1px);
            background-size: 24px 24px;
        }

        .contact-card {
            background: var(--card-bg);
            width: 100%;
            max-width: 440px;
            border-radius: 0px;
            border: 1px solid var(--grid-line);
            outline: 6px solid rgba(15, 23, 42, 0.02);
            position: relative;
        }

        .contact-card::before, .contact-card::after {
            content: '';
            position: absolute;
            width: 12px;
            height: 12px;
            border: 1px solid var(--grid-line);
            pointer-events: none;
        }
        .contact-card::before { top: -6px; left: -6px; border-right: none; border-bottom: none; }
        .contact-card::after { bottom: -6px; right: -6px; border-left: none; border-top: none; }

        .header {
            text-align: center;
            padding: 40px 40px 32px 40px;
            border-bottom: 1px solid var(--grid-line-subtle);
        }

        h1 {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
            text-transform: uppercase;
            font-size: 22px;
            letter-spacing: 0.05em;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 14px;
            line-height: 1.5;
        }

        .info-list {
            display: flex;
            flex-direction: column;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 24px 40px;
            border-bottom: 1px solid var(--grid-line-subtle);
            background: #ffffff;
            transition: background-color 0.2s ease;
        }

        .info-item:hover {
            background-color: #f1f5f9;
        }

        .icon-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            background: #eff6ff;
            color: var(--accent-color);
            border: 1px solid #dbeafe;
            border-radius: 4px;
            font-size: 16px;
            flex-shrink: 0;
        }

        .content {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .value {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-main);
            text-decoration: none;
            line-height: 1.4;
            transition: color 0.15s ease;
        }

        a.value:hover {
            color: var(--accent-color);
        }

        footer {
            padding: 24px 40px;
            text-align: center;
            color: var(--text-muted);
            font-size: 12px;
            letter-spacing: 0.02em;
            background: var(--card-bg);
        }
    </style>
</head>
<body>

    <main class="contact-card">
        <header class="header">
            <h1>Contact Us</h1>
            <p class="subtitle">Have questions? We are here to help you.</p>
        </header>

        <div class="info-list">
            <div class="info-item">
                <div class="icon-wrapper">
                    <i class="fa-regular fa-envelope"></i>
                </div>
                <div class="content">
                    <span class="label">Email</span>
                    <a href="mailto:sample@email.com" class="value">sample@email.com</a>
                </div>
            </div>

            <div class="info-item">
                <div class="icon-wrapper">
                    <i class="fa-solid fa-phone"></i>
                </div>
                <div class="content">
                    <span class="label">Phone</span>
                    <a href="tel:+639123456789" class="value">+63 912 345 6789</a>
                </div>
            </div>

            <div class="info-item">
                <div class="icon-wrapper">
                    <i class="fa-solid fa-location-dot"></i>
                </div>
                <div class="content">
                    <span class="label">Address</span>
                    <span class="value">Sample Street, Sample City, Philippines</span>
                </div>
            </div>
        </div>

        <footer>
            &copy; 2026 Contact Us. All rights reserved.
        </footer>
    </main>

</body>
</html>
