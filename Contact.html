<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <!-- Professional Font and Icons -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cloudflare.com">

    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #475569;
            --border-color: #e2e8f0;
            --accent-color: #2563eb;
            --accent-hover: #1d4ed8;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .contact-card {
            background: var(--card-bg);
            width: 100%;
            max-width: 420px;
            padding: 40px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow);
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 15px;
            line-height: 1.5;
        }

        .info-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background: #ffffff;
            transition: all 0.2s ease-in-out;
        }

        .info-item:hover {
            border-color: var(--accent-color);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.05);
        }

        .icon-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            background: #eff6ff;
            color: var(--accent-color);
            border-radius: 10px;
            font-size: 18px;
        }

        .content {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .value {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-main);
            text-decoration: none;
            line-height: 1.4;
            transition: color 0.15s ease;
        }

        a.value:hover {
            color: var(--accent-color);
        }

        footer {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid var(--border-color);
            text-align: center;
            color: var(--text-muted);
            font-size: 13px;
        }
    </style>
</head>
<body>

    <main class="contact-card">
        <header class="header">
            <h1>Contact Us</h1>
            <p class="subtitle">Have questions? We are here to help you.</p>
        </header>

        <div class="info-list">
            <div class="info-item">
                <div class="icon-wrapper">
                    <i class="fa-regular fa-envelope"></i>
                </div>
                <div class="content">
                    <span class="label">Email</span>
                    <a href="mailto:sample@email.com" class="value">sample@email.com</a>
                </div>
            </div>

            <div class="info-item">
                <div class="icon-wrapper">
                    <i class="fa-solid fa-phone"></i>
                </div>
                <div class="content">
                    <span class="label">Phone</span>
                    <a href="tel:+639123456789" class="value">+63 912 345 6789</a>
                </div>
            </div>

            <div class="info-item">
                <div class="icon-wrapper">
                    <i class="fa-solid fa-location-dot"></i>
                </div>
                <div class="content">
                    <span class="label">Address</span>
                    <span class="value">Sample Street, Sample City, Philippines</span>
                </div>
            </div>
        </div>

        <footer>
            &copy; 2026 Contact Us. All rights reserved.
        </footer>
    </main>

</body>
</html>
